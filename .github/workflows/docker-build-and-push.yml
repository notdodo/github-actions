name: Docker Build and Push

on:
  workflow_call:
    inputs:
      disable-sudo:
        type: boolean
        default: true
      dockerfile:
        type: string
        default: 'Dockerfile'
      egress-policy-allowlist:
        type: string
        default: ''
      flavor:
        type: string
        description: 'Defines a global behavior for tags'
        default: |
          latest=auto
          prefix=
          suffix=
      image:
        required: true
        type: string
      platforms:
        type: string
        default: 'linux/amd64,linux/arm64'
      push:
        type: boolean
        default: false
      registry:
        type: string
        default: ''
      runs-on:
        type: string
        default: 'ubuntu-latest'
      scan-image:
        type: boolean
        default: true
      sign-image:
        type: boolean
        default: true
      tags:
        type: string
        default: |
          type=schedule
          type=ref,event=branch
          type=ref,event=tag
          type=ref,event=pr
      trivy-severity:
        type: string
        default: 'CRITICAL,HIGH'
      trivy-vuln-type:
        type: string
        default: 'os,library'
      upload-sarif:
        type: boolean
        default: true
      working-directory:
        type: string
        default: '.'
    outputs:
      image_name:
        description: 'Full image name (<registry>/<image>).'
        value: ${{ jobs.build-and-push-image.outputs.image_name }}
      image_digest:
        description: 'Pushed image digest (sha256:...), empty when push=false.'
        value: ${{ jobs.build-and-push-image.outputs.image_digest }}
      image_ref:
        description: 'Immutable image reference (<registry>/<image>@<digest>), empty when push=false.'
        value: ${{ jobs.build-and-push-image.outputs.image_ref }}
      local_image_ref:
        description: 'Local image reference used when push=false.'
        value: ${{ jobs.build-and-push-image.outputs.local_image_ref }}
    secrets:
      registry-username:
        required: false
      registry-password:
        required: false

jobs:
  build-and-push-image:
    outputs:
      image_name: ${{ steps.workflow-outputs.outputs.image_name }}
      image_digest: ${{ steps.workflow-outputs.outputs.image_digest }}
      image_ref: ${{ steps.workflow-outputs.outputs.image_ref }}
      local_image_ref: ${{ steps.workflow-outputs.outputs.local_image_ref }}
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
      security-events: write
    name: Docker build and push
    runs-on: ${{ inputs.runs-on }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          disable-sudo: ${{ inputs.disable-sudo }}
          egress-policy: block
          allowed-endpoints: >
            *.docker.com:443
            *.docker.io:443
            *.githubapp.com:443
            *.githubusercontent.com:443
            *.sigstore.dev:443
            *.trivy.dev:443
            api.github.com:443
            codeload.github.com:443
            docker-images-prod.*.r2.cloudflarestorage.com:443
            ghcr.io:443
            github.com:443
            mirror.gcr.io:443
            release-assets.githubusercontent.com:443
            ${{ inputs.egress-policy-allowlist }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          cache-binary: false
      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        if: inputs.push
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.registry-username }}
          password: ${{ secrets.registry-password }}
      - name: Extract metadata (tags, labels) for Docker
        id: metadata
        if: inputs.push
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ inputs.registry }}/${{ inputs.image }}
          tags: ${{ inputs.tags }}
          flavor: ${{ inputs.flavor }}
      - name: Build and push
        id: build
        if: inputs.push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          annotations: ${{ steps.metadata.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: ./${{ inputs.working-directory }}
          file: ${{ inputs.working-directory }}/${{ inputs.dockerfile }}
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: ${{ inputs.platforms }}
          provenance: mode=max
          push: ${{ inputs.push }}
          tags: ${{ steps.metadata.outputs.tags }}
      - name: Build push locally
        id: build-local
        if: ${{ !inputs.push }}
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: ./${{ inputs.working-directory }}
          file: ${{ inputs.working-directory }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          load: true
          push: false
          tags: localimage:${{ github.sha }}
      - name: Set workflow outputs
        id: workflow-outputs
        env:
          IMAGE_NAME: ${{ format('{0}/{1}', inputs.registry, inputs.image) }}
          IMAGE_DIGEST: ${{ inputs.push && steps.build.outputs.digest || '' }}
          IMAGE_REF: ${{ inputs.push && format('{0}/{1}@{2}', inputs.registry, inputs.image, steps.build.outputs.digest) || '' }}
          LOCAL_IMAGE_REF: ${{ !inputs.push && format('localimage:{0}', github.sha) || '' }}
        run: |
          {
            echo "image_name=${IMAGE_NAME}"
            echo "image_digest=${IMAGE_DIGEST}"
            echo "image_ref=${IMAGE_REF}"
            echo "local_image_ref=${LOCAL_IMAGE_REF}"
          } >> "${GITHUB_OUTPUT}"
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        if: inputs.scan-image
        with:
          format: sarif
          ignore-unfixed: true
          image-ref: ${{ inputs.push && format('{0}/{1}@{2}', inputs.registry, inputs.image, steps.build.outputs.digest) || format('localimage:{0}', github.sha) }}
          vuln-type: ${{ inputs.trivy-vuln-type }}
          severity: ${{ inputs.trivy-severity }}
          output: ${{ inputs.working-directory }}/trivy_results.sarif
          github-pat: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate SBOM
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        if: inputs.push
        with:
          format: spdx-json
          image-ref: ${{ format('{0}/{1}@{2}', inputs.registry, inputs.image, steps.build.outputs.digest) }}
          output: ${{ inputs.working-directory }}/sbom.spdx.json
          github-pat: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate artifact and SBOM attestation
        if: inputs.push
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ inputs.registry }}/${{ inputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: ${{ startsWith(inputs.registry, 'ghcr.io') }}
          sbom-path: ${{ inputs.working-directory }}/sbom.spdx.json
      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        if: inputs.push && inputs.sign-image
      - name: Sign image
        if: inputs.push && inputs.sign-image
        env:
          COSIGN_YES: 'true'
          IMAGE_REF: ${{ format('{0}/{1}@{2}', inputs.registry, inputs.image, steps.build.outputs.digest) }}
          CERT_OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          cosign sign "${IMAGE_REF}"
          cosign verify \
            --certificate-identity-regexp '^https://github.com/notdodo/github-actions/.github/workflows/docker-build-and-push.yml@refs/tags/docker-build-and-push-v[0-9]+$' \
            --certificate-oidc-issuer "${CERT_OIDC_ISSUER}" "${IMAGE_REF}"
      - uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        if: inputs.scan-image
      - name: Run reviewdog
        if: inputs.scan-image
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo -n "$(cat ./trivy_results.sarif)" | reviewdog -reporter=github-check -f=sarif -level=warning -diff="git diff FETCH_HEAD"
      - name: Upload results
        if: ${{ inputs.scan-image && inputs.upload-sarif }}
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 #  v4.32.6
        with:
          sarif_file: ${{ inputs.working-directory }}/trivy_results.sarif
          category: container-security
